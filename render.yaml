# Render Blueprint for SupportIQ
# This blueprint defines the architecture for deploying the Go API on Render.
# Database is hosted externally on Neon. Task queue works in-process without Redis.

services:
  # ── Go API Web Service ───────────────────────────────────────────────────────
  - type: web
    name: supportiq-api
    env: go
    rootDir: backend
    buildCommand: go build -o api ./cmd/
    startCommand: ./api
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set manually in the Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set manually in the Render dashboard (e.g., https://your-app.vercel.app)
      - key: WEBSOCKET_ORIGIN
        sync: false # Set manually in the Render dashboard (e.g., https://your-app.vercel.app)
      - key: APP_URL
        sync: false # Set manually in the Render dashboard (e.g., https://your-app.vercel.app)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Optional
      - key: GROQ_API_KEY
        sync: false # Optional

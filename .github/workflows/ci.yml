name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go backend: vet + build both binaries ─────────────────────────────────────
  build-backend:
    name: Go build & vet (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Build API server binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/

      - name: Build worker binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/worker/

  # ── Frontend: verify Vite build succeeds ──────────────────────────────────────
  build-frontend:
    name: Vite build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # ── Verify Docker images build cleanly ────────────────────────────────────────
  docker-build-api:
    name: Docker build (api)
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-worker:
    name: Docker build (worker)
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker_image
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-build-frontend:
    name: Docker build (frontend)
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          build-args: |
            VITE_API_URL=http://localhost:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max
